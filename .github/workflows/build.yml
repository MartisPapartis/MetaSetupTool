name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: MetaSetupTool-windows
          - os: macos-latest
            artifact_name: MetaSetupTool-mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: >
          pyinstaller
          --onefile
          --windowed
          --name MetaSetupTool
          --add-data "Import template.xlsx;."
          main.py

      - name: Build with PyInstaller (macOS)
        if: runner.os == 'macOS'
        run: >
          pyinstaller
          --windowed
          --name MetaSetupTool
          --add-data "Import template.xlsx:."
          main.py

      - name: Zip .app bundle (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent dist/MetaSetupTool.app MetaSetupTool-mac.zip

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: MetaSetupTool-mac
          path: MetaSetupTool-mac.zip
          retention-days: 30

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: MetaSetupTool-windows
          path: dist/MetaSetupTool.exe
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name != 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Zip Windows artifact
        run: |
          cd artifacts/MetaSetupTool-windows
          zip ../MetaSetupTool-windows.zip MetaSetupTool.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/MetaSetupTool-windows.zip
            artifacts/MetaSetupTool-mac/MetaSetupTool-mac.zip
          generate_release_notes: true
